<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Download the ALEX POS mobile app for Android.">
  <title>Download ALEX POS</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f6f6;
      --card: #ffffff;
      --text: #101010;
      --muted: #5f5f5f;
      --border: #d6d6d6;
      --primary: #111111;
      --primary-text: #ffffff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f0f;
        --card: #171717;
        --text: #f5f5f5;
        --muted: #b7b7b7;
        --border: #3d3d3d;
        --primary: #f5f5f5;
        --primary-text: #101010;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
    }

    main {
      width: min(100%, 440px);
      padding: 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    .logo {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid var(--border);
    }

    h1 {
      margin: 18px 0 8px;
      font-size: 30px;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 24px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--primary);
      background: var(--primary);
      color: var(--primary-text);
      font-weight: 700;
      text-decoration: none;
    }

    .button.secondary {
      background: transparent;
      color: var(--text);
      border-color: var(--border);
    }

    .meta {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .note {
      margin-top: 20px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="../assets/assets/logo.jpg" alt="ALEX POS logo">
    <h1>Download ALEX POS</h1>
    <p>The Android APK download should start automatically. If it does not, tap the button below and allow the APK install when Android asks.</p>

    <div class="actions">
      <a class="button" id="download-apk" href="https://alex-pos.web.app/download/alex-pos.apk" download rel="noopener">
        Download now
      </a>
      <a class="button secondary" href="https://alex-pos.web.app" rel="noopener">
        Open web app
      </a>
    </div>

    <div class="meta" id="release-meta">Preparing download...</div>

    <div class="note">
      If your browser blocks the automatic download, tap Download now.
    </div>
  </main>

  <script>
    (function () {
      var apkUrl = 'https://alex-pos.web.app/download/alex-pos.apk';
      var downloadLink = document.getElementById('download-apk');
      var meta = document.getElementById('release-meta');
      var downloadStarted = false;

      function setDownload(url, versionName) {
        if (downloadLink) {
          downloadLink.href = url;
          downloadLink.textContent = 'Download now';
        }
        if (meta) {
          var version = versionName ? 'Version ' + versionName : 'Latest version';
          meta.textContent = version + ' download is starting...';
        }
        startDownload(url);
      }

      function startDownload(url) {
        if (downloadStarted) {
          return;
        }
        downloadStarted = true;
        window.setTimeout(function () {
          window.location.assign(url);
        }, 700);
      }

      if (downloadLink) {
        downloadLink.addEventListener('click', function () {
          downloadStarted = true;
        });
      }

      function isManualMode() {
        try {
          return new URLSearchParams(window.location.search).get('manual') === '1';
        } catch (_) {
          return false;
        }
      }

      if (isManualMode()) {
        if (meta) {
          meta.textContent = 'Tap Download now to install the Android app.';
        }
        return;
      }

      setDownload(apkUrl, '1.0.4');
    })();
  </script>
</body>
</html>
